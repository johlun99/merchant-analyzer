changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: "✨ New Features"
      labels:
        - feat
        - feature
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - fix
        - bug
        - bugfix
    - title: "📚 Documentation"
      labels:
        - docs
        - documentation
    - title: "♻️ Refactoring"
      labels:
        - refactor
    - title: "🧪 Tests"
      labels:
        - test
    - title: "🔧 Maintenance"
      labels:
        - chore
        - ci
        - build
        - perf
    - title: "Other Changes"
      labels:
        - "*"
